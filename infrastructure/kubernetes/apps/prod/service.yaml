apiVersion: v1
kind: Service
metadata:
  name: crezcamos
  namespace: production
  labels:
    app: crezcamos
    environment: production
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  selector:
    app: crezcamos
    environment: production
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  externalTrafficPolicy: Local
  healthCheckNodePort: 32000

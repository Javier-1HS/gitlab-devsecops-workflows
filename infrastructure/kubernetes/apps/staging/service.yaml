apiVersion: v1
kind: Service
metadata:
  name: crezcamos
  namespace: staging
  labels:
    app: crezcamos
    environment: staging
spec:
  type: LoadBalancer
  selector:
    app: crezcamos
    environment: staging
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  sessionAffinity: None
  externalTrafficPolicy: Local

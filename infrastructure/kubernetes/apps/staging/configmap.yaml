apiVersion: v1
kind: ConfigMap
metadata:
  name: crezcamos-config
  namespace: staging
  labels:
    app: crezcamos
    environment: staging
data:
  environment: "staging"
  log.level: "info"
  cache.ttl: "600"
  api.timeout: "30"
  feature.flags: |
    {
      "newFeature": true,
      "betaFeatures": true,
      "debugMode": false
    }
  application.yml: |
    server:
      port: 8080
      servlet:
        context-path: /
    logging:
      level:
        root: INFO
        com.crezcamos: INFO
    spring:
      application:
        name: crezcamos
      jpa:
        show-sql: false
        hibernate:
          ddl-auto: validate

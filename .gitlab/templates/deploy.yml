# Template compartido para tareas de despliegue
# Incluye funciones comunes de despliegue, health checks y verificaciones

# Job: Health Check Base
.health-check:
  stage: post-deploy
  image: curlimages/curl:latest
  script:
    - echo "💚 Verificando salud de la aplicación..."
    - sleep 30  # Dar tiempo para que la app arranque
    - |
      for i in {1..10}; do
        if curl -f -s $HEALTH_CHECK_URL > /dev/null; then
          echo "✅ Aplicación respondiendo correctamente"
          exit 0
        fi
        echo "⏳ Intento $i/10 - esperando..."
        sleep 10
      done
      echo "❌ La aplicación no responde después de 10 intentos"
      exit 1
  allow_failure: false

# Job: Smoke Tests Base
.smoke-tests:
  stage: post-deploy
  image: curlimages/curl:latest
  script:
    - echo "💨 Ejecutando smoke tests..."
    - sleep 30  # Dar tiempo para que los servicios arranquen
    - |
      # Health check
      for i in {1..15}; do
        if curl -f -s $HEALTH_CHECK_URL > /dev/null; then
          echo "✅ Health check OK (intento $i)"
          break
        fi
        if [ $i -eq 15 ]; then
          echo "❌ Health check falló después de 15 intentos"
          exit 1
        fi
        sleep 5
      done
    
    # Version check
    - |
      VERSION=$(curl -s $HEALTH_CHECK_URL/version 2>/dev/null | jq -r '.version' 2>/dev/null || echo "unknown")
      echo "📦 Versión desplegada: $VERSION"
  allow_failure: false

# Job: Kubernetes Deployment Base
.k8s-deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  before_script:
    - |
      if [ ! -z "$GCP_SERVICE_ACCOUNT_KEY" ]; then
        echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > ${HOME}/gcp-key.json
        gcloud auth activate-service-account --key-file ${HOME}/gcp-key.json
        gcloud config set project $GCP_PROJECT_ID
        gcloud container clusters get-credentials $K8S_CLUSTER --region $GCP_REGION
        kubectl version --client
      fi
  script:
    - echo "🚀 Desplegando en Kubernetes..."
    - kubectl create namespace $K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    - echo "✅ Despliegue completado"

# Job: Create Kubernetes Secrets
.create-k8s-secrets:
  stage: deploy
  image: google/cloud-sdk:alpine
  script:
    - echo "🔐 Creando secrets en Kubernetes..."
    
    # Docker registry secret
    - |
      kubectl create secret docker-registry regcred \
        --docker-server=$CI_REGISTRY \
        --docker-username=$CI_REGISTRY_USER \
        --docker-password=$CI_REGISTRY_PASSWORD \
        --docker-email=$GITLAB_USER_EMAIL \
        -n $K8S_NAMESPACE \
        --dry-run=client -o yaml | kubectl apply -f -
    
    # Application secrets
    - |
      if [ ! -z "$DATABASE_URL" ] || [ ! -z "$API_KEY" ]; then
        kubectl create secret generic app-secrets \
          --from-literal=database-url=${DATABASE_URL:-""} \
          --from-literal=api-key=${API_KEY:-""} \
          -n $K8S_NAMESPACE \
          --dry-run=client -o yaml | kubectl apply -f -
      fi
    
    - echo "✅ Secrets creados correctamente"

# Job: Apply Kubernetes Manifests
.apply-k8s-manifests:
  stage: deploy
  image: google/cloud-sdk:alpine
  script:
    - echo "📋 Aplicando manifiestos de Kubernetes..."
    
    # Deployment
    - |
      if [ -f "$DEPLOYMENT_FILE" ]; then
        cat $DEPLOYMENT_FILE | \
        sed "s|IMAGE_PLACEHOLDER|$IMAGE_FULL|g" | \
        sed "s|NAMESPACE_PLACEHOLDER|$K8S_NAMESPACE|g" | \
        kubectl apply -f -
      fi
    
    # Service
    - |
      if [ -f "$SERVICE_FILE" ]; then
        kubectl apply -f $SERVICE_FILE -n $K8S_NAMESPACE
      fi
    
    # ConfigMap
    - |
      if [ -f "$CONFIGMAP_FILE" ]; then
        kubectl apply -f $CONFIGMAP_FILE -n $K8S_NAMESPACE
      fi
    
    # HPA (Horizontal Pod Autoscaler)
    - |
      if [ -f "$HPA_FILE" ]; then
        kubectl apply -f $HPA_FILE -n $K8S_NAMESPACE
      fi
    
    - echo "✅ Manifiestos aplicados correctamente"

# Job: Verify Deployment Rollout
.verify-rollout:
  stage: deploy
  image: google/cloud-sdk:alpine
  script:
    - echo "⏳ Esperando rollout del deployment..."
    - kubectl rollout status deployment/$DEPLOYMENT_NAME -n $K8S_NAMESPACE --timeout=$ROLLOUT_TIMEOUT
    
    # Verificar pods
    - |
      READY_PODS=$(kubectl get deployment $DEPLOYMENT_NAME -n $K8S_NAMESPACE -o jsonpath='{.status.readyReplicas}')
      DESIRED_PODS=$(kubectl get deployment $DEPLOYMENT_NAME -n $K8S_NAMESPACE -o jsonpath='{.spec.replicas}')
      
      echo "📊 Pods listos: $READY_PODS / $DESIRED_PODS"
      
      if [ "$READY_PODS" != "$DESIRED_PODS" ]; then
        echo "❌ No todos los pods están listos"
        echo "Logs del deployment:"
        kubectl describe deployment $DEPLOYMENT_NAME -n $K8S_NAMESPACE
        kubectl logs -l app=$CI_PROJECT_NAME -n $K8S_NAMESPACE --tail=50
        exit 1
      fi
    
    - echo "✅ Rollout completado exitosamente"

# Job: Rollback Deployment
.rollback-deployment:
  stage: rollback
  image: google/cloud-sdk:alpine
  before_script:
    - |
      if [ ! -z "$GCP_SERVICE_ACCOUNT_KEY" ]; then
        echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > ${HOME}/gcp-key.json
        gcloud auth activate-service-account --key-file ${HOME}/gcp-key.json
        gcloud config set project $GCP_PROJECT_ID
        gcloud container clusters get-credentials $K8S_CLUSTER --region $GCP_REGION
      fi
  script:
    - echo "⏮️ Ejecutando rollback..."
    - kubectl rollout undo deployment/$DEPLOYMENT_NAME -n $K8S_NAMESPACE
    - kubectl rollout status deployment/$DEPLOYMENT_NAME -n $K8S_NAMESPACE --timeout=10m
    - echo "✅ Rollback completado"
  when: manual
  allow_failure: false

# Job: Delete Deployment
.delete-deployment:
  stage: deploy
  image: google/cloud-sdk:alpine
  script:
    - echo "🗑️ Eliminando recursos del despliegue..."
    - kubectl delete deployment $DEPLOYMENT_NAME -n $K8S_NAMESPACE --ignore-not-found=true
    - kubectl delete service $SERVICE_NAME -n $K8S_NAMESPACE --ignore-not-found=true
    - echo "✅ Recursos eliminados"
  when: manual

# Job: Get Service URL
.get-service-url:
  stage: post-deploy
  image: google/cloud-sdk:alpine
  script:
    - echo "🌐 Obteniendo URL del servicio..."
    - |
      for i in {1..30}; do
        SERVICE_URL=$(kubectl get svc $SERVICE_NAME -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
        if [ ! -z "$SERVICE_URL" ]; then
          echo "✅ URL del servicio: http://$SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> service.env
          exit 0
        fi
        echo "⏳ Esperando IP del Load Balancer (intento $i/30)..."
        sleep 5
      done
      echo "⚠️ No se obtuvo IP del Load Balancer después de 2.5 minutos"
      echo "SERVICE_URL=pending" >> service.env
  artifacts:
    reports:
      dotenv: service.env

# Job: Notify Deployment
.notify-deployment:
  stage: post-deploy
  image: curlimages/curl:latest
  script:
    - echo "📢 Notificando despliegue..."
    - |
      if [ ! -z "$SLACK_WEBHOOK_URL" ]; then
        curl -X POST $SLACK_WEBHOOK_URL \
          -H 'Content-Type: application/json' \
          -d "{
            \"text\": \"$DEPLOYMENT_STATUS en $K8S_NAMESPACE\",
            \"blocks\": [
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*${DEPLOYMENT_STATUS}*\n*Rama:* $CI_COMMIT_BRANCH\n*Commit:* $CI_COMMIT_SHORT_SHA\n*Autor:* $GITLAB_USER_NAME\n*Ambiente:* $K8S_NAMESPACE\"
                }
              }
            ]
          }"
      fi
    - echo "✅ Notificación enviada"
  allow_failure: true

# Template para proyectos Flutter
# Variables requeridas: FLUTTER_VERSION (default: 3.x)

# Job: Flutter Build for Android
.flutter-build-android:
  stage: build
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  variables:
    PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"
  before_script:
    - export PATH="$PATH:$PUB_CACHE/bin"
  script:
    - echo "🎯 Building Flutter for Android..."
    # Clean is optional in CI; remove it to speed up builds
    # - flutter clean 
    - flutter pub get
    - flutter build apk --release --no-tree-shake-icons
    - echo "✅ Android APK build completado"
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
    expire_in: 1 hour
  cache:
    key: 
      files:
        - pubspec.lock
    paths:
      - .dart_tool/
      - .pub-cache/
      
# Job: Flutter Build for iOS
.flutter-build-ios:
  stage: build
  tags:
    - macos # This tag must match your GitLab Runner's configuration
  variables:
    PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"
  script:
    - echo "🍎 Building Flutter for iOS..."
    - flutter pub get
    - flutter build ios --release --no-codesign # Build without signing for now
    - echo "✅ iOS build completado"
  artifacts:
    paths:
      - build/ios/iphoneos/Runner.app
    expire_in: 1 hour
  cache:
    key: "ios-${CI_COMMIT_REF_SLUG}"
    paths:
      - .dart_tool/
      - .pub-cache/
      - ios/Pods/ # Adding CocoaPods to cache is a huge time-saver for iOS builds

# Job: Flutter Build Web
.flutter-build-web:
  stage: build
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  variables:
    PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"
  script:
    - echo "🌐 Building Flutter for Web..."
    - flutter pub get
    - flutter build web --release --base-href "/${CI_PROJECT_NAME}/"
  artifacts:
    name: "$CI_JOB_NAME-web-release"
    paths:
      - build/web/
    expire_in: 1 day
  cache:
    key: 
      files:
        - pubspec.lock
    paths:
      - .dart_tool/
      - .pub-cache/

# Trabajo real de Build (para cualquier rama)
web-build:
  extends: .flutter-build-web

# Trabajo de despliegue (solo para la rama principal)
pages:
  stage: deploy
  dependencies:
    - web-build  # Reutiliza los artefactos generados arriba
  script:
    - mkdir -p public
    - mv build/web/* public/
    - echo "🚀 App disponible en https://${CI_PROJECT_NAMESPACE}.gitlab.io/${CI_PROJECT_NAME}"
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Un paso extra: El Linter (Análisis Estático)
# --- Jobs de Validación ---

linting:
  extends: .flutter-base
  stage: lint
  script:
    - echo "✨ Analizando estilo de código..."
    - flutter pub get
    - flutter analyze
    - echo "✅ Código limpio y siguiendo buenas prácticas"

# Job: Flutter Tests
.flutter-tests:
  stage: test
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  variables:
    PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"
  before_script:
    - flutter pub global activate lcov_exporter # Opcional: para conversión de formatos
    - export PATH="$PATH:$PUB_CACHE/bin"
  script:
    - echo "🧪 Running Flutter unit tests..."
    - flutter pub get
    - flutter test --coverage
    # Tip: Si quieres ver el porcentaje en la consola para que el regex lo capture:
    - lcov --summary coverage/lcov.info 
    - echo "✅ Unit tests completado"
  artifacts:
    name: "coverage-report"
    paths:
      - coverage/
    reports:
      # Nota: Para que el reporte aparezca en el MR, necesitas convertir lcov a cobertura.xml
      # Si no tienes el conversor, puedes omitir la línea 'coverage_report' y usar solo 'artifacts'
      lcov: coverage/lcov.info
    expire_in: 30 days
  # Este Regex es correcto para capturar el total desde la salida de la consola
  coverage: '/lines\.\.\.\.\.\.:\s*(\d+\.?\d*)%/'
  allow_failure: false
  cache:
    key: 
      files:
        - pubspec.lock
    paths:
      - .dart_tool/
      - .pub-cache/

# Job: Flutter Widget Tests
.flutter-widget-tests:
  stage: test
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  script:
    - echo "🎨 Running Flutter widget tests..."
    - flutter pub get
    - flutter test --verbose
    - echo "✅ Widget tests completado"
  artifacts:
    paths:
      - test_results/
    expire_in: 30 days
  allow_failure: false
  cache:
    key: ${CI_COMMIT_REF_SLUG}-flutter
    paths:
      - .dart_tool/
      - pub_cache/

# Job: Flutter Integration Tests
.flutter-integration-tests:
  stage: test
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  script:
    - echo "🔗 Running Flutter integration tests..."
    - flutter pub get
    - flutter drive --target=test_driver/app.dart || true
    - echo "✅ Integration tests completado"
  artifacts:
    paths:
      - integration_test_reports/
    expire_in: 30 days
  allow_failure: true
  cache:
    key: ${CI_COMMIT_REF_SLUG}-flutter
    paths:
      - .dart_tool/
      - pub_cache/

# Job: Flutter Linting
.flutter-lint:
  stage: build
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  script:
    - echo "✏️ Running Flutter linting..."
    - flutter pub get
    - flutter analyze
    - dart format --set-exit-if-changed .
    - echo "✅ Linting completado"
  allow_failure: false
  cache:
    key: ${CI_COMMIT_REF_SLUG}-flutter
    paths:
      - .dart_tool/
      - pub_cache/

# Job: Flutter Code Quality Analysis
.flutter-quality:
  stage: quality
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  script:
    - echo "🔍 Running code quality analysis..."
    - flutter pub get
    - dart pub global activate dart_code_metrics
    - metrics analyze lib --set-exit-on-violation-level=warning || true
    - echo "✅ Quality analysis completado"
  artifacts:
    paths:
      - metrics-report/
    expire_in: 30 days
  allow_failure: true
  cache:
    key: ${CI_COMMIT_REF_SLUG}-flutter
    paths:
      - .dart_tool/
      - pub_cache/

# Job: Build Docker Image for Flutter Web
.flutter-docker-build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  dependencies:
    - build-flutter-web
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - echo "🐳 Building Flutter Docker image..."
    - |
      docker build \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=$CI_COMMIT_SHA \
        -t $IMAGE_NAME:flutter-$IMAGE_TAG \
        -f docker/flutter/Dockerfile .
    - docker push $IMAGE_NAME:flutter-$IMAGE_TAG
    - echo "✅ Flutter image build and pushed"
  after_script:
    - docker logout "$CI_REGISTRY"

# Job: SonarQube Analysis for Flutter
.flutter-sonarqube:
  stage: quality
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  script:
    - echo "🔬 Running SonarQube analysis for Flutter..."
    - echo "Note: Configure SonarQube con support para Dart"
    - flutter pub get
    - flutter test --coverage
    - echo "✅ SonarQube preparation completado"
  allow_failure: true
  cache:
    key: ${CI_COMMIT_REF_SLUG}-flutter
    paths:
      - .dart_tool/
      - pub_cache/

# Job: Flutter Security Audit
.flutter-security:
  stage: security-scan
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  script:
    - echo "🔐 Running Flutter security checks..."
    - flutter pub get
    - dart pub audit || true
    - echo "✅ Security audit completado"
  allow_failure: true
  cache:
    key: ${CI_COMMIT_REF_SLUG}-flutter
    paths:
      - .dart_tool/
      - pub_cache/

# Job: Upload Android to Firebase/Play Store
.flutter-upload-android:
  stage: post-deploy
  image: cirrusci/flutter:${FLUTTER_VERSION:-3.13.0}
  dependencies:
    - build-flutter-android
  script:
    - echo "📱 Uploading Android APK..."
    # Configurar credenciales de Play Store
    - echo "Uploading to Firebase/Play Store"
    - echo "✅ Android APK uploaded"
  only:
    - tags
  allow_failure: true

# Job: Health Check for Flutter Web
.flutter-health-check:
  stage: post-deploy
  image: curlimages/curl:latest
  script:
    - echo "💚 Checking Flutter Web application..."
    - |
      for i in {1..15}; do
        if curl -f -s http://${APP_HOST}:${APP_PORT:-80} | grep -q 'flutter'; then
          echo "✅ Flutter application is running"
          exit 0
        fi
        echo "⏳ Attempt $i/15..."
        sleep 5
      done
      echo "❌ Flutter application health check failed"
      exit 1
  allow_failure: false

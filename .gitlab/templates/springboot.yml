# Template para proyectos Spring Boot
# Variables requeridas:
# - MAVEN_OPTS (opcional): -Xmx512m
# - SONAR_HOST_URL, SONAR_TOKEN (para análisis)

# Job: Maven Clean Install
.springboot-build:
  stage: build
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  variables:
    MAVEN_OPTS: "-Xmx512m"
    MAVEN_CLI_OPTS: "-s ci_settings.xml"
  before_script:
    - echo "🔨 Building Spring Boot application..."
  script:
    - mvn clean install -DskipTests=true # mvn clean package -DskipTests=true
    - echo "✅ Build completado"
  artifacts:
    paths:
      - target/*.jar
      - target/classes/
    expire_in: 1 hour
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .m2/repository/
  allow_failure: false

# Job: Maven Unit Tests and Coverage
.springboot-tests:
  stage: test
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  variables:
    MAVEN_OPTS: "-Xmx512m"
  script:
    - echo "🧪 Running Spring Boot unit tests..."
    - mvn clean test -Dproject.build.sourceEncoding=UTF-8
    - mvn jacoco:report
    - echo "✅ Tests completado"
  artifacts:
    paths:
      - target/site/jacoco/
      - target/surefire-reports/
    reports:
      junit: target/surefire-reports/TEST-*.xml
      coverage_report:
        coverage_format: cobertura
        path: target/site/jacoco/jacoco.xml
    expire_in: 30 days
  coverage: '/(?i)total.*?(\d+%)/'
  allow_failure: false

# Job: Integration Tests
.springboot-integration-tests:
  stage: test
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  variables:
    MAVEN_OPTS: "-Xmx512m"
  script:
    - echo "🔗 Running Spring Boot integration tests..."
    # Tests en carpeta integration
    - mvn -Dtest="**/*IT" verify
    - echo "✅ Integration tests completado"
  artifacts:
    paths:
      - target/failsafe-reports/
    reports:
      junit: target/failsafe-reports/TEST-*.xml
    expire_in: 30 days
  allow_failure: true

# Job: Spring Boot Security Tests
.springboot-security:
  stage: security-scan
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  script:
    - echo "🔐 Running Spring Boot security checks..."
    # Añadir plugins de seguridad en pom.xml
    - mvn dependency-check:check || true
    - mvn org.springframework.security:spring-security-bom::check || true
    - echo "✅ Security scan completado"
  artifacts:
    paths:
      - target/dependency-check-report.*
    expire_in: 30 days
  allow_failure: true

# Job: Build Docker Image for Spring Boot
.springboot-docker-build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - echo "🐳 Building Spring Boot Docker image..."
    - |
      docker build \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=$CI_COMMIT_SHA \
        --build-arg VERSION=$CI_COMMIT_TAG \
        -t $IMAGE_NAME:springboot-$IMAGE_TAG \
        -f docker/spring-boot/Dockerfile .
    - docker push $IMAGE_NAME:springboot-$IMAGE_TAG
    - echo "✅ Spring Boot image build and pushed"
  after_script:
    - docker logout "$CI_REGISTRY"

# Job: SonarQube Analysis for Spring Boot
.springboot-sonarqube:
  stage: quality
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  script:
    - echo "🔬 Running SonarQube analysis for Spring Boot..."
    - mvn clean verify sonar:sonar
      -Dsonar.projectKey=$CI_PROJECT_NAME
      -Dsonar.host.url=$SONAR_HOST_URL
      -Dsonar.login=$SONAR_TOKEN
      -Dsonar.sources=src/main/java
      -Dsonar.tests=src/test/java
      -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
    - echo "✅ SonarQube analysis completado"
  allow_failure: true

# Job: Artifact Repository Upload
.springboot-upload-artifact:
  stage: post-deploy
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  script:
    - echo "📦 Uploading artifact to repository..."
    # Configurar URL del repositorio Nexus/Artifact en settings.xml
    - mvn deploy -DskipTests=true
    - echo "✅ Artifact uploaded"
  allow_failure: true
  only:
    - tags
    - main

# Job: Start Spring Boot Application (para testing)
.springboot-run:
  stage: post-deploy
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  script:
    - echo "🚀 Starting Spring Boot application..."
    - java -jar target/*.jar &
    - sleep 30  # Dar tiempo para que arranque
    - curl -f http://localhost:8080/actuator/health || exit 1
    - echo "✅ Spring Boot application is running"
  allow_failure: true

# Job: Health Check for Spring Boot
.springboot-health-check:
  stage: post-deploy
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  script:
    - echo "💚 Checking Spring Boot application health..."
    - |
      for i in {1..30}; do
        if curl -f -s http://${APP_HOST}:${APP_PORT}/actuator/health | grep -q '"status":"UP"'; then
          echo "✅ Application is healthy"
          exit 0
        fi
        echo "⏳ Attempt $i/30..."
        sleep 5
      done
      echo "❌ Application health check failed"
      exit 1
  allow_failure: false

# Job: Linting for Java
.springboot-lint:
  stage: build
  image: maven:3.8-eclipse-temurin-17 # maven:3.9-eclipse-temurin-21
  script:
    - echo "✏️ Running code style checks..."
    - mvn checkstyle:check || true
    - mvn pmd:pmd || true
    - echo "✅ Code style validation completado"
  allow_failure: true

# Job: OWASP ZAP Security Scanning
.security-dast-template:
  stage: test
  image: owasp/zap2docker-stable:2.14.0 # Versión fija para estabilidad
  variables:
    # Estas variables se sobreescriben en cada proyecto
    APP_URL: "http://${APP_HOST}:${APP_PORT}"
  script:
    - mkdir -p /zap/wrk # Directorio de trabajo requerido por ZAP
    - echo "🔐 Iniciando escaneo DAST en ${APP_URL}..."
    - |
      # Lógica para elegir el script según el stack
      if [[ "$STACK" == "SPRING_BOOT" ]]; then
        # Escaneo específico para APIs (requiere definición OpenAPI/Swagger)
        zap-api-scan.py -t ${APP_URL}/v3/api-docs -f openapi -r report.html -J report.json || true
      else
        # Escaneo baseline para Angular/Flutter Web/Node
        zap-baseline.py -t ${APP_URL} -r report.html -J report.json || true
      fi
  artifacts:
    when: always
    paths:
      - report.html
      - report.json
    expire_in: 30 days
  allow_failure: true
sonar.projectKey=crezcamos
sonar.projectName=Crezcamos
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Ruta de las fuentes
sonar.sources=src
sonar.tests=tests,__tests__
sonar.test.inclusions=**/*.test.js,**/*.test.ts,**/*.spec.js,**/*.spec.ts
sonar.test.exclusions=node_modules/**

# Exclusiones
sonar.exclusions=node_modules/**,dist/**,coverage/**,build/**

# Cobertura de código
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Análisis de seguridad
sonar.security.hotspots.review.priority=HIGH

# Reglas de calidad
sonar.qualitygate.timeout=300
sonar.qualitygate.wait=true

# Reports
sonar.issues.report.export.path=reports/issues-report.json

# --- Soporte para Spring Boot (Java) ---
sonar.java.binaries=**/target/classes
sonar.java.libraries=**/target/dependency/*.jar
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# --- Soporte para Flutter (Dart) ---
# Flutter usa LCOV igual que JS, pero es bueno asegurar la ruta
sonar.dart.analysis.reportPaths=coverage/lcov.info

# --- Refinamiento de Fuentes ---
# Cambiamos src por . para que detecte archivos de configuración en la raíz (ej. Dockerfile)
sonar.sources=.
sonar.inclusions=src/**,lib/**,pom.xml,package.json,Dockerfile,**/*.yml,**/*.yaml

# Priorizar el análisis de vulnerabilidades (Injection, Weak Cryptography)
sonar.vulnerability.analysis.level=HIGH

# Excluir archivos que suelen dar falsos positivos en seguridad (Mocks/Samples)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=security:S5147
sonar.issue.ignore.multicriteria.e1.resourceKey=**/test/**